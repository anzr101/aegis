services:
  aegis:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Optional — leave blank for DEMO mode, add key for LIVE AI.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AEGIS_MODEL=${AEGIS_MODEL:-claude-sonnet-4-6}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
